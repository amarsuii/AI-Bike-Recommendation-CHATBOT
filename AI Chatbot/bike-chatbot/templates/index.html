<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Bike Recommendation Bot 🚀</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Global */
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", Arial, sans-serif;
            background: #0d1117;
            color: white;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header p {
            color: #d1d5db;
        }

        /* Chat box */
        .chat-box {
            background: #111827;
            padding: 20px;
            border-radius: 18px;
            height: 25vh;
            overflow-y: auto;
            border: 1px solid #1f2937;
        }

        /* Chat bubbles */
        .bot-msg, .user-msg {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            margin-bottom: 12px;
            line-height: 1.4;
            font-size: 15px;
        }

        .bot-msg {
            background: #1e293b;
            color: white;
            width: fit-content;
        }

        .user-msg {
            background: #10b981;
            color: black;
            margin-left: auto;
        }

        /* Input */
        .input-area {
            display: flex;
            margin-top: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: #1f2937;
            color: white;
        }

        .input-area button {
            padding: 12px 20px;
            margin-left: 10px;
            border-radius: 30px;
            border: none;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* Category Buttons */
        .category-btn {
            background: #2563eb;
            padding: 10px 18px;
            border-radius: 25px;
            color: white;
            display: inline-block;
            margin: 10px 0;
            cursor: pointer;
        }

        /* Bike Card */
        .bike-card {
            background: #111827;
            border: 1px solid #1f2937;
            padding: 14px;
            border-radius: 16px;
            margin-top: 15px;
        }

        .bike-card img {
            width: 100%;
            border-radius: 12px;
        }

        .bike-card h3 {
            margin: 10px 0 5px 0;
            color: #93c5fd;
        }

        .bike-card p {
            margin: 0;
            color: #d1d5db;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>AI Bike Recommendation Bot 🚀</h1>
        <p>Tell me your budget & purpose — I’ll suggest your best bike 👍</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="bot-msg">
            Hi! I am your bike assistant. Tell me your budget and usage.<br><br>
            <i>Example: “Suggest a bike under 1.5 lakh for office commute.”</i>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    // Add message to chat UI
    function addMessage(text, type = "bot") {
        const chatBox = document.getElementById("chatBox");

        const msg = document.createElement("div");
        msg.className = type === "bot" ? "bot-msg" : "user-msg";
        msg.innerHTML = text;

        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Handle send message
    function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");

        // Dummy AI response (replace with backend later)
        setTimeout(() => {
            showBikeCard();
        }, 700);

        input.value = "";
    }

    // Example bike card (like screenshot)
    function showBikeCard() {
        const card = `
            <div class="bike-card">
                <img src="https://www.heromotocorp.com/en-in/motorcycles/passenger-bikes/xpulse-200-4v/images/xpulse-200-4v-red.png" />

                <h3>🏍️ Hero XPulse 200 4V</h3>
                <p>💰 ₹165000 (~1.65 lakh)</p>
            </div>
        `;
        addMessage(card, "bot");
    }
</script>

</body>
</html>
